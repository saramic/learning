<svg viewBox="0 0 500 340" xmlns="http://www.w3.org/2000/svg" style="max-width:480px; width:100%; background:#fafafa; border:1px solid #ddd; border-radius:8px;">
  <text x="250" y="26" text-anchor="middle" font-family="sans-serif" font-size="15" font-weight="bold" fill="#333">Chocolate plate after a short burst — 6 melt spots</text>

  <!-- heatproof tray -->
  <rect x="20" y="40" width="460" height="260" rx="12" fill="#e2e2e2" stroke="#999" stroke-width="2"/>

  <!-- chocolate bar (unmelted) -->
  <rect x="40" y="60" width="420" height="220" rx="8" fill="#c9a06a" stroke="#8a6239" stroke-width="2"/>

  <!-- melt spots: 3 columns x 2 rows -->
  <g>
    <circle cx="130" cy="120" r="19" fill="#3b1f0f"/>
    <circle cx="250" cy="120" r="16" fill="#3b1f0f"/>
    <circle cx="370" cy="120" r="20" fill="#3b1f0f"/>
    <circle cx="130" cy="220" r="17" fill="#3b1f0f"/>
    <circle cx="250" cy="220" r="21" fill="#3b1f0f"/>
    <circle cx="370" cy="220" r="15" fill="#3b1f0f"/>
    <!-- glossy highlight on each melted spot -->
    <ellipse cx="124" cy="114" rx="5" ry="3" fill="#7a4a26" opacity="0.6"/>
    <ellipse cx="244" cy="114" rx="4" ry="2.5" fill="#7a4a26" opacity="0.6"/>
    <ellipse cx="364" cy="114" rx="5" ry="3" fill="#7a4a26" opacity="0.6"/>
    <ellipse cx="124" cy="214" rx="4.5" ry="3" fill="#7a4a26" opacity="0.6"/>
    <ellipse cx="244" cy="214" rx="5.5" ry="3.5" fill="#7a4a26" opacity="0.6"/>
    <ellipse cx="364" cy="214" rx="4" ry="2.5" fill="#7a4a26" opacity="0.6"/>
  </g>

  <!-- row spacing measurement -->
  <line x1="130" y1="120" x2="250" y2="120" stroke="#c0392b" stroke-width="1.5" marker-start="url(#dot)" marker-end="url(#dot)"/>
  <text x="190" y="105" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#c0392b">spacing ≈ λ/2</text>

  <!-- column spacing measurement -->
  <line x1="130" y1="120" x2="130" y2="220" stroke="#2c6fbb" stroke-width="1.5" marker-start="url(#dot)" marker-end="url(#dot)"/>
  <text x="70" y="175" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#2c6fbb" transform="rotate(-90 70 175)">spacing ≈ λ/2</text>

  <defs>
    <marker id="dot" markerWidth="6" markerHeight="6" refX="3" refY="3">
      <circle cx="3" cy="3" r="2.5" fill="#333"/>
    </marker>
  </defs>

  <text x="250" y="318" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#555">Turntable removed, static field → a 2D grid of hot spots, not just one pair</text>
</svg>
