# Name of your application. Used to uniquely configure containers.
service: speed-of-light-calculator

# Pushed to GitHub Container Registry under the saramic org, same as peregrino.
image: saramic/speed-of-light-calculator

# Deploy to peregrino-c (uses the HostName/User/IdentityFile already set up in ~/.ssh/config).
servers:
  web:
    - peregrino-c

# ~/.ssh/config points peregrino-c at the "ubuntu" user; Kamal defaults to "root"
# unless told otherwise, so this has to be set explicitly.
ssh:
  user: ubuntu

# Cloudflare in front of c.pair-with.me is set to "Flexible" SSL mode (shared with
# other sites, so not changing it here) — meaning Cloudflare terminates TLS with the
# visitor's browser and connects to this origin over plain HTTP. So the proxy serves
# plain HTTP too (no `ssl: true`); forcing HTTPS here would redirect that plain HTTP
# request back to HTTPS, which Cloudflare would loop forever. `host` still gets us
# routing by hostname, so this coexists with other apps (e.g. peregrino) on the
# same server.
proxy:
  host: c.pair-with.me

registry:
  server: ghcr.io
  username: saramic
  password:
    - KAMAL_REGISTRY_PASSWORD

# Build on the server itself (native amd64) rather than locally via QEMU emulation.
# QEMU's user-mode emulation is known to intermittently segfault while compiling
# native C extensions (puma, erb, nio4r, etc.) — it can pass once and then fail on
# an identical rebuild. Building remotely sidesteps that entirely, same as peregrino.
builder:
  arch: amd64
  remote: ssh://ubuntu@peregrino-c

# No database, sessions, or secrets are used by this app, so no `env:` block is needed.
